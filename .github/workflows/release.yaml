name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@5459c6e6550bcc6969303a65ef6c44bb1cd0ccf1 # v0.43.2
    with:
      image: ghcr.io/radiorabe/kafka
      name: kafka
      display-name: RaBe Kafka on UBI9
      tags: minimal rhel9 ubi9 rabe kafka
      cosign-base-image-only: true
      platforms: "linux/amd64,linux/arm64"
      docker-daemon-config: |
        {
          "features": {
            "containerd-snapshotter": true
          }
        }
  release-mkdocs:
    permissions:
      contents: write # Required to push the gh-pages branch for documentation deployment
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@5459c6e6550bcc6969303a65ef6c44bb1cd0ccf1 # v0.43.2
  github-actions:
    permissions:
      contents: read
      security-events: write # so zizmor can publish results to the Security tab
    uses: radiorabe/actions/.github/workflows/test-github-actions.yaml@5459c6e6550bcc6969303a65ef6c44bb1cd0ccf1 # v0.43.2
